<script>
    window.onscroll = function () { scrollFunction() };

    function scrollFunction() {
        if (document.body.scrollTop > 30 || document.documentElement.scrollTop > 50) {

            // document.querySelector.("navbar").style.backgroundColor = "black";

            document.querySelectorAll('#navbar').forEach(link => {
                link.style.backdropFilter = "blur(10px)";
                link.style.backgroundColor = "rgba(0,0,0,0.5)";
            })
            document.getElementById("logo").src = "./images/profex2.png";

            document.querySelectorAll('.nav-link').forEach(link => {
                link.style.color = "white";
            });




        } else {

            document.querySelectorAll('#navbar').forEach(link => {
                link.style.backdropFilter = "blur(0px)";
                link.style.backgroundColor = "transparent";
            })
            document.getElementById("logo").src = "./images/profex.png";

            document.querySelectorAll('.line').forEach(line => {
                line.style.stroke = "black";
            });

            document.querySelectorAll('.nav-link').forEach(link => {
                link.style.color = "black";
            });
        }

    }
</script>
<script type="module">

    import { initRules } from "./js/rules.js";
    import { teamProfex } from "./js/team.js";

    function loadSection(sectionId, linkId, callback) {
        const container = document.getElementById(sectionId);
        const link = document.getElementById(linkId);

        fetch(link.href)
            .then((response) => response.text())
            .then((html) => {
                container.innerHTML = html;

                if (callback) callback();
            });
    }

    loadSection("start_load", "start");
    loadSection("caroucel_load", "caroucel");
    loadSection("about_us_load", "about_us");
    loadSection("services_load", "services");
    loadSection("branding_load", "branding");
    loadSection("team_load", "team", () => {
        teamProfex();
    });

    loadSection("navbar_load", "navbar");
    loadSection("rules_load", "rules", () => {
        initRules();
    });

    loadSection("contact_load", "contact");

</script>
